name: Build & Deploy

# Build backend + frontend images on GitHub's runners, push them to GHCR,
# then SSH into the VPS to pull the new images and restart the services.
# The VPS itself never compiles anything.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Run JS-based actions on Node.js 24 (Node 20 is deprecated on the runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------------
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # needed to push to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase image owner
        run: echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/ql175-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/ql175-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/ql175-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/ql175-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read       # so the GITHUB_TOKEN can pull images on the VPS
    steps:
      - name: SSH into VPS and run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}        # optional; defaults to 22 if empty
          envs: GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            cd ${{ secrets.VPS_PROJECT_DIR }}
            bash scripts/deploy.sh
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
