spring.application.name=project-management

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/project_mgmt?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
# Don't quote columnDefinition values (e.g. TEXT) — else Hibernate emits invalid `TEXT` DDL and milestones/tasks tables fail to create
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Server
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# CORS (handled in code)

# Multipart upload (Excel files up to 50MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
jwt.secret=QT175ProjectManagementSecretKey2025XYZ_MustBe256BitsLong!!
jwt.expiration=86400000
